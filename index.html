<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TOP | Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="titleBanner">
            <div class="title">Basic Calculator</div>
            <div class="author">By: Sam Wang</div>
            <div class="desc">Basic calculator webapp. Created as final project for <a href="https://www.theodinproject.com/paths">The Odin Project</a> - Foundations course</div>
        </div>
        <div class="calculatorModule">
            <div class="calculatorFrame">
                <div class="outputScreen">
                    <div class="currentNumber">
                        <!-- Current Number/Operation Goes Here -->
                    </div>
                    <div class="outputText">
                        <!-- Output Goes Here -->
                    </div>
                </div>
                <div class="controlButtons">
                    <div class="moduleOne">
                        <div class="inputButtons">
                            <div class="buttonRow">
                                <button id="7">7</button>
                                <button id="8">8</button>
                                <button id="9">9</button>
                            </div>
                            <div class="buttonRow">
                                <button id="4">4</button>
                                <button id="5">5</button>
                                <button id="6">6</button>
                            </div>
                            <div class="buttonRow">
                                <button id="1">1</button>
                                <button id="2">2</button>
                                <button id="3">3</button>
                            </div>
                            <div class="buttonRow lastRow">
                                <button id="0">0</button>
                                <button id=".">.</button>
                            </div>
                        </div>
                        <div class="operationsButtons">
                            <button id="+">+</button>
                            <button id="-">-</button>
                            <button id="*">×</button>
                            <button id="/">÷</button>
                        </div>
                    </div>
                    <div class="moduleTwo">
                        <div class="utilityButtons">
                            <button id="clearAll">Clear</button>
                            <button id="=">=</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="calculator.js"></script>
    </body>
</html>
