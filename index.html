<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TOP | Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="calculatorModule">
            <div class="calculatorFrame">
                <div class="outputScreen">
                    <div class="outputText">
                        0123456789
                    </div>
                </div>
                <div class="controlButtons">
                    <div class="moduleOne">
                        <div class="inputButtons">
                            <div class="buttonRow">
                                <button class="seven">7</button>
                                <button class="eight">8</button>
                                <button class="nine">9</button>
                            </div>
                            <div class="buttonRow">
                                <button class="four">4</button>
                                <button class="five">5</button>
                                <button class="six">6</button>
                            </div>
                            <div class="buttonRow">
                                <button class="one">1</button>
                                <button class="two">2</button>
                                <button class="three">3</button>
                            </div>
                            <div class="buttonRow">
                                <button class="zero">0</button>
                            </div>
                        </div>
                        <div class="operationsButtons">
                            <button class="addition">+</button>
                            <button class="subtraction">-</button>
                            <button class="multiplication">×</button>
                            <button class="division">÷</button>
                        </div>
                    </div>
                    <div class="moduleTwo">
                        <div class="utilityButtons">
                            <button class="del">⌫</button>
                            <button class="equals">=</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="calculator.js"></script>
    </body>
</html>
